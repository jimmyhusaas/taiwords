<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>TaiWords</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <main>
    <header>
      <h1>TaiWords <span class="badge">台詞</span></h1>
      <p class="tagline">辨識網頁中的疑似支語</p>
    </header>

    <section class="actions">
      <button id="scan" class="primary">掃描本頁</button>
      <button id="clear" class="ghost">清除標記</button>
    </section>

    <section class="control">
      <label for="conf">
        信心度下限
        <span id="conf-val">0.70</span>
      </label>
      <input id="conf" type="range" min="0.3" max="1" step="0.05" value="0.7">
      <p class="hint">越高越嚴格。0.7 是預設，0.5 會多抓兩岸通用詞。</p>
    </section>

    <section id="result" class="result idle">
      <p class="status">尚未掃描</p>
    </section>

    <footer>
      <a href="http://localhost:8080/swagger-ui.html" target="_blank">API 文件</a>
      <span class="version">v0.0.1</span>
    </footer>
  </main>
  <script type="module" src="./main.ts"></script>
</body>
</html>
