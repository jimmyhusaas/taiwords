spring:
  application:
    name: taiwords-api

  datasource:
    url: ${TAIWORDS_DB_URL:jdbc:postgresql://localhost:5432/taiwords}
    username: ${TAIWORDS_DB_USER:taiwords}
    password: ${TAIWORDS_DB_PASSWORD:taiwords}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate           # 由 Flyway 管 schema，JPA 只 validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false            # 避免 lazy loading in view 反模式

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  compression:
    enabled: true
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs

taiwords:
  seed:
    enabled: ${TAIWORDS_SEED_ENABLED:true}
    path: classpath:seed/
  detection:
    # 預設偵測信心度下限。詞庫中 confidence < 此值的詞條不會被掃描。
    # 0.7 是經驗校準值：
    #   - 拋掉「自行車 0.5 / 動漫 0.4 / 老板 0.4 / 開發者 0.3 / 顏值 0.3」這類兩岸通用詞
    #   - 保留 168/200 條真有差異的詞（含「電視劇 0.7」「優化→裁員 0.7」這類灰色但有信號的）
    # 使用者可在 POST /detect 的 options.minConfidence 個別調整。
    default-min-confidence: ${TAIWORDS_DETECTION_MIN_CONFIDENCE:0.7}
  cors:
    # CORS 允許的 origin，逗號分隔。Phase 2 為了讓 Chrome extension 從任意網頁
    # 跨域呼叫本地 API，預設 `*`。部署到 public URL 後建議收緊為具體 host。
    allowed-origins: ${TAIWORDS_CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    io.taiwords: ${TAIWORDS_LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
