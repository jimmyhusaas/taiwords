spring:
  application:
    name: taiwords-api

  datasource:
    url: ${TAIWORDS_DB_URL:jdbc:postgresql://localhost:5432/taiwords}
    username: ${TAIWORDS_DB_USER:taiwords}
    password: ${TAIWORDS_DB_PASSWORD:taiwords}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate           # 由 Flyway 管 schema，JPA 只 validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false            # 避免 lazy loading in view 反模式

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  compression:
    enabled: true
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs

taiwords:
  seed:
    enabled: ${TAIWORDS_SEED_ENABLED:true}
    path: classpath:seed/

logging:
  level:
    io.taiwords: ${TAIWORDS_LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
