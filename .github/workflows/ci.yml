name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-build-test:
    name: API · Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: taiwords_test
          POSTGRES_USER: taiwords
          POSTGRES_PASSWORD: taiwords
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taiwords"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build & Test
        working-directory: services/api
        env:
          TAIWORDS_DB_URL: jdbc:postgresql://localhost:5432/taiwords_test
          TAIWORDS_DB_USER: taiwords
          TAIWORDS_DB_PASSWORD: taiwords
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: services/api/build/reports/tests/

  docker-build:
    name: API · Docker image (build only)
    runs-on: ubuntu-latest
    needs: api-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: taiwords-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
